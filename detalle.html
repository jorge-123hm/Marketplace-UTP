<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle del producto</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<!-- barra de navegacion -->
<nav class="navbar navbar-expand-lg navbar-dark bg-danger">
    <div class="container">
        <a class="navbar-brand" href="index.html">UTP Marketplace</a>
        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
                <li class="nav-item"><a class="nav-link" href="productos.html">Productos</a></li>
                <li class="nav-item">
                    <a class="nav-link" href="carrito.html">🛒 Carrito<span id="contadorCarrito" class="badge bg-light text-danger ms-1">0</span></a>
                </li>
            </ul>
        </div>
    </div>
</nav>
<main>
<!-- Detalle del libro -->
<section class="container py-5">
    <div class="row">
        <div class="col-md-5">
            <img id="imagenProducto" src="" class="img-fluid rounded shadow" alt="Producto">
        </div>
        <div class="col-md-7">
            <h2 id="nombreProducto"></h2>
            <h4 id="precioProducto" class="text-success"></h4>
            <p id="descripcionProducto"></p>
            <ul class="list-group mb-3">
                <li class="list-group-item">
                    <strong>Estado:</strong>
                    <span id="estadoProducto"></span>
                </li>

                <li class="list-group-item">
                    <strong>Categoría:</strong>
                    <span id="categoriaProducto"></span>
                </li>

                <li class="list-group-item">
                    <strong>Stock:</strong>
                    <span id="stockProducto"></span>
                </li>
            </ul>
            <button id="btnCarrito" class="btn btn-danger">
                Agregar al carrito
            </button>
            <a href="productos.html" class="btn btn-secondary">
                Volver
            </a>
        </div>
    </div>
</section>

<div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="toastCarrito"
        class="toast text-bg-success border-0"
        role="alert">
        <div class="d-flex">
            <div class="toast-body">
                ✅ Producto agregado al carrito.
            </div>
            <button
                type="button"
                class="btn-close btn-close-white me-2 m-auto"
                data-bs-dismiss="toast">
            </button>
        </div>
    </div>
</div>
</main>
<!-- Footer -->
<footer class="bg-dark text-white text-center p-3">
    <p>© 2026 UTP Marketplace</p>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/carrito.js"></script>
<script src="js/detalle.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrador - UTP Marketplace</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-danger">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                UTP Marketplace
            </a>
        </div>
    </nav>

    <main class="container py-5">
        <h2 class="text-center mb-5">
            Panel de Administración
        </h2>
        <!-- Formulario -->
        <div class="card shadow">
            <div class="card-body">
                <form id="formProducto">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">
                                Nombre
                            </label>
                            <input id="nombre" type="text" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">
                                Precio
                            </label>
                            <input id="precio" type="number" step="0.01" class="form-control" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">
                            Descripción
                        </label>
                        <textarea id="descripcion" class="form-control" rows="3" required></textarea>
                    </div>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">
                                Categoría
                            </label>
                            <select id="categoria" class="form-select">
                                <option>Tecnología</option>
                                <option>Libros</option>
                                <option>Uniformes</option>
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">
                                Stock
                            </label>
                            <input id="stock" type="number" class="form-control" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">
                                Estado
                            </label>
                            <select id="estado" class="form-select">
                                <option>Nuevo</option>
                                <option>Usado</option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">
                            Imagen
                        </label>
                        <input id="imagen" type="file" class="form-control" accept="image/*" required>
                    </div>
                    <div class="text-end">
                        <button id="btnGuardar" class="btn btn-danger">
                            Agregar Producto
                        </button>
                    </div>
                </form>
            </div>
        </div>
        <hr class="my-5">
        <h3 class="mb-4">
            Productos registrados
        </h3>
        <div class="row mb-3">
            <div class="col-md-5">
                <input type="text" id="buscarProducto" class="form-control" placeholder="Buscar producto por nombre...">
            </div>
        </div>
        <div class="table-responsive">
            <table class="table table-bordered table-hover align-middle">
                <thead class="table-dark">
                    <tr>
                        <th></th>
                        <th>Nombre</th>
                        <th>Precio</th>
                        <th>Categoría</th>
                        <th>Stock</th>
                        <th>Estado</th>
                        <th width="180">
                            Acciones
                        </th>
                    </tr>
                </thead>
                <tbody id="tablaProductos">
                </tbody>
            </table>
        </div>
    </main>
    <footer class="bg-dark text-white text-center p-3">
        © 2026 UTP Marketplace
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/admin.js"></script>
</body>

</html>

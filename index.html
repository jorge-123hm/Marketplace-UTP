<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UTP Books Marketplace</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<!-- barra de navegacion -->
<nav class="navbar navbar-expand-lg navbar-dark bg-danger">
    <div class="container">
        <a class="navbar-brand" href="#">UTP Marketplace</a>
        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link active" href="index.html">Inicio</a></li>
                <li class="nav-item"><a class="nav-link" href="productos.html">Productos</a></li>
                <li class="nav-item">
                    <a class="nav-link" href="carrito.html">🛒 Carrito<span id="contadorCarrito" class="badge bg-light text-danger ms-1">0</span></a>
                </li>
            </ul>
        </div>
    </div>
</nav>
<main>
<!-- Banner -->
<section class="container text-center py-5">
    <h1>Compra productos para tu carrera universitaria</h1>
    <p>Marketplace para estudiantes de la UTP.</p>
    <img src="img/bannerutp.jpg" class="img-fluid my-3" alt="Banner">
    <br>
    <a href="productos.html" class="btn btn-danger">
        Explora entre muchos productos
    </a>
</section>
<!-- Categorías -->
<section class="container py-5">
    <h2 class="text-center mb-4">Categorías</h2>
    <div class="row text-center">
        <div class="col-md-4">
            <div class="card p-3">
                <img src="img/cat-tecnologia.jpeg">
                <h5>Tecnología</h5>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card p-3">
                <img src="img/cat-libros.jpeg">
                <h5>Libros</h5>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card p-3">
                <img src="img/cat-uniforme.jpeg">
                <h5>Uniformes</h5>
            </div>
        </div>
    </div>
</section>
<!-- Libros destacados -->
<section class="container py-5">
    <h2 class="text-center mb-4">Productos Destacados</h2>
    <div class="row" id="productosDestacados">
    </div>
</section>
</main>
<!-- Footer -->
<footer class="bg-dark text-white text-center p-3">
    <p>© 2026 UTP Marketplace</p>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/main.js"></script>
<script src="js/carrito.js"></script>
<script src="js/index.js"></script>
</body>
</html>
